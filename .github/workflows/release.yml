name: Release Desktop App

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # 阶段 1: 验证 tag 并创建 release (只跑一次)
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.verify.outputs.tag }}
      version: ${{ steps.verify.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify tag matches version
        id: verify
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$VERSION" != "$TAG" ]; then
            echo "::error::Tag v$TAG 与 package.json version $VERSION 不一致,请保持一致后再发版"
            exit 1
          fi
          echo "Tag v$TAG 与 package.json version $VERSION 一致,继续发布"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.verify.outputs.tag }}" \
            --title "MD Editor v${{ steps.verify.outputs.tag }}" \
            --notes "See the assets to download and install this version." \
            --target main

  # 阶段 2: 三平台并行编译
  build:
    name: Build (${{ matrix.platform }})
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: macos-latest
            target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install npm dependencies
        run: npm ci --registry https://registry.npmjs.org

      - name: Generate icons (macOS only)
        if: matrix.platform == 'macos-latest'
        run: |
          cd src-tauri/icons
          mkdir icon.iconset
          sips -z 16 16 icon.png --out icon.iconset/icon_16x16.png
          sips -z 32 32 icon.png --out icon.iconset/icon_16x16@2x.png
          sips -z 32 32 icon.png --out icon.iconset/icon_32x32.png
          sips -z 64 64 icon.png --out icon.iconset/icon_32x32@2x.png
          sips -z 128 128 icon.png --out icon.iconset/icon_128x128.png
          sips -z 256 256 icon.png --out icon.iconset/icon_128x128@2x.png
          sips -z 256 256 icon.png --out icon.iconset/icon_256x256.png
          sips -z 512 512 icon.png --out icon.iconset/icon_256x256@2x.png
          sips -z 512 512 icon.png --out icon.iconset/icon_512x512.png
          sips -z 1024 1024 icon.png --out icon.iconset/icon_512x512@2x.png
          iconutil -c icns icon.iconset -o icon.icns

      - name: Build frontend
        run: npm run build

      - name: Build Tauri app
        shell: bash
        run: |
          BUNDLES=""
          if [ "${{ matrix.platform }}" = "windows-latest" ]; then
            BUNDLES="--bundles nsis"
          elif [ "${{ matrix.platform }}" = "ubuntu-22.04" ]; then
            BUNDLES="--bundles deb"
          else
            BUNDLES="--bundles app,dmg"
          fi
          npm run tauri build -- $BUNDLES

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: md-editor-${{ matrix.platform }}
          path: |
            src-tauri/target/release/bundle/**/*
            src-tauri/target/release/*.exe

  # 阶段 3: 把所有平台的产物上传到 release
  publish:
    name: Publish to release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: md-editor-windows-latest
          path: artifacts/windows

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: md-editor-macos-latest
          path: artifacts/macos

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: md-editor-ubuntu-22.04
          path: artifacts/linux

      - name: Upload Windows assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ needs.prepare.outputs.version }}"
          find artifacts/windows -type f \( -name "*.exe" -o -name "*.msi" \) -exec \
            gh release upload "$TAG" {} --clobber \;

      - name: Upload macOS assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ needs.prepare.outputs.version }}"
          find artifacts/macos -type f \( -name "*.dmg" -o -name "*.app.tar.gz" -o -name "*.app" \) -exec \
            gh release upload "$TAG" {} --clobber \;

      - name: Upload Linux assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ needs.prepare.outputs.version }}"
          find artifacts/linux -type f \( -name "*.deb" -o -name "*.AppImage" \) -exec \
            gh release upload "$TAG" {} --clobber \;

      - name: Mark release as latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "v${{ needs.prepare.outputs.version }}" --draft=false
