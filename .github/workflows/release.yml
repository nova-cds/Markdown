name: Release Desktop App

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # 阶段 1: 验证 tag 并创建 release (只跑一次)
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.verify.outputs.tag }}
      version: ${{ steps.verify.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify tag matches version
        id: verify
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$VERSION" != "$TAG" ]; then
            echo "::error::Tag v$TAG 与 package.json version $VERSION 不一致,请保持一致后再发版"
            exit 1
          fi
          echo "Tag v$TAG 与 package.json version $VERSION 一致,继续发布"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create release (allow failure if already exists)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.verify.outputs.tag }}" \
            --title "MD Editor v${{ steps.verify.outputs.tag }}" \
            --notes "See the assets to download and install this version." \
            --target main || echo "release exists, continuing"

  # 阶段 2: 三平台并行编译 + 上传到 release
  build:
    name: Build (${{ matrix.platform }})
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: --bundles nsis
          - platform: macos-latest
            target: x86_64-apple-darwin
            args: --bundles app,dmg
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: --bundles deb

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install npm dependencies
        run: npm ci --registry https://registry.npmjs.org

      - name: Generate icons (macOS only)
        if: matrix.platform == 'macos-latest'
        run: |
          cd src-tauri/icons
          mkdir icon.iconset
          sips -z 16 16 icon.png --out icon.iconset/icon_16x16.png
          sips -z 32 32 icon.png --out icon.iconset/icon_16x16@2x.png
          sips -z 32 32 icon.png --out icon.iconset/icon_32x32.png
          sips -z 64 64 icon.png --out icon.iconset/icon_32x32@2x.png
          sips -z 128 128 icon.png --out icon.iconset/icon_128x128.png
          sips -z 256 256 icon.png --out icon.iconset/icon_128x128@2x.png
          sips -z 256 256 icon.png --out icon.iconset/icon_256x256.png
          sips -z 512 512 icon.png --out icon.iconset/icon_256x256@2x.png
          sips -z 512 512 icon.png --out icon.iconset/icon_512x512.png
          sips -z 1024 1024 icon.png --out icon.iconset/icon_512x512@2x.png
          iconutil -c icns icon.iconset -o icon.icns

      - name: Build frontend
        run: npm run build

      - name: Build Tauri app
        shell: bash
        run: |
          npm run tauri build -- ${{ matrix.args }}

      - name: Upload to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ needs.prepare.outputs.version }}"
          cd src-tauri/target/release/bundle
          if [ "${{ matrix.platform }}" = "windows-latest" ]; then
            find nsis -type f -name "*.exe" -exec gh release upload "$TAG" {} --clobber \;
            find . -maxdepth 1 -type f -name "*.exe" -exec gh release upload "$TAG" {} --clobber \;
          elif [ "${{ matrix.platform }}" = "macos-latest" ]; then
            find dmg -type f \( -name "*.dmg" -o -name "*.pkg" \) -exec gh release upload "$TAG" {} --clobber \;
            find macos -type f \( -name "*.app" -o -name "*.app.tar.gz" \) -exec gh release upload "$TAG" {} --clobber \;
          else
            find deb -type f -name "*.deb" -exec gh release upload "$TAG" {} --clobber \;
            find appimage -type f -name "*.AppImage" -exec gh release upload "$TAG" {} --clobber \;
          fi
