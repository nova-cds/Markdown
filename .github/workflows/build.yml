name: Build Desktop App

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-release:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.get_tag.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version tag
        id: get_tag
        run: echo "tag=v$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ steps.get_tag.outputs.tag }} \
            --title "MD Editor ${{ steps.get_tag.outputs.tag }}" \
            --notes "See the assets to download and install this version." \
            --draft || echo "Release already exists"

  build:
    needs: [create-release]
    if: always() && (needs.create-release.result == 'success' || needs.create-release.result == 'skipped')
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: macos-latest
            target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install npm dependencies
        run: npm ci --registry https://registry.npmjs.org

      - name: Generate icons (macOS only)
        if: matrix.platform == 'macos-latest'
        run: |
          cd src-tauri/icons
          mkdir icon.iconset
          sips -z 16 16 icon.png --out icon.iconset/icon_16x16.png
          sips -z 32 32 icon.png --out icon.iconset/icon_16x16@2x.png
          sips -z 32 32 icon.png --out icon.iconset/icon_32x32.png
          sips -z 64 64 icon.png --out icon.iconset/icon_32x32@2x.png
          sips -z 128 128 icon.png --out icon.iconset/icon_128x128.png
          sips -z 256 256 icon.png --out icon.iconset/icon_128x128@2x.png
          sips -z 256 256 icon.png --out icon.iconset/icon_256x256.png
          sips -z 512 512 icon.png --out icon.iconset/icon_256x256@2x.png
          sips -z 512 512 icon.png --out icon.iconset/icon_512x512.png
          sips -z 1024 1024 icon.png --out icon.iconset/icon_512x512@2x.png
          iconutil -c icns icon.iconset -o icon.icns

      - name: Build frontend
        run: npm run build

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.platform == 'windows-latest' && '--bundles nsis' || (matrix.platform == 'ubuntu-22.04' && '--bundles deb' || '') }}

      - name: Upload to release (macOS)
        if: matrix.platform == 'macos-latest' && startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $VERSION = node -p "require('./package.json').version"
          $TAG = "v$VERSION"
          Get-ChildItem -Path "src-tauri/target/release/bundle/dmg" -Filter "*.dmg" -File | ForEach-Object {
            Write-Host "Uploading $($_.Name)..."
            gh release upload $TAG $_.FullName --clobber
          }

      - name: Upload to release (Linux)
        if: matrix.platform == 'ubuntu-22.04' && startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $VERSION = node -p "require('./package.json').version"
          $TAG = "v$VERSION"
          Get-ChildItem -Path "src-tauri/target/release/bundle/deb" -Filter "*.deb" -File | ForEach-Object {
            Write-Host "Uploading $($_.Name)..."
            gh release upload $TAG $_.FullName --clobber
          }

      - name: Upload to release (Windows)
        if: matrix.platform == 'windows-latest' && startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $VERSION = node -p "require('./package.json').version"
          $TAG = "v$VERSION"
          
          # Upload NSIS installer
          Get-ChildItem -Path "src-tauri/target/release/bundle/nsis" -Filter "*.exe" -File | ForEach-Object {
            Write-Host "Uploading $($_.Name)..."
            gh release upload $TAG $_.FullName --clobber
          }
          
          # Upload portable exe
          $exePath = Get-ChildItem -Path "src-tauri/target/release" -Filter "*.exe" -File | Where-Object { $_.Name -notlike "*setup*" } | Select-Object -First 1
          
          if ($exePath) {
            Write-Host "Found exe: $($exePath.FullName)"
            Copy-Item $exePath.FullName "MD-Editor-Portable-$TAG.exe"
            gh release upload $TAG "MD-Editor-Portable-$TAG.exe" --clobber
            Write-Host "Uploaded portable exe to release $TAG"
          } else {
            Write-Host "Portable exe not found"
            Write-Host "Available exe files:"
            Get-ChildItem -Path "src-tauri/target/release" -Filter "*.exe" -File | ForEach-Object { Write-Host "  $($_.Name)" }
          }

      - name: Upload artifacts (Windows)
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: md-editor-windows
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/*.exe

      - name: Upload artifacts (macOS)
        if: matrix.platform == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: md-editor-macos
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app

      - name: Upload artifacts (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: md-editor-linux
          path: src-tauri/target/release/bundle/deb/*.deb
